scale_image: 2
image_height_original: 256
image_width_original: 192
image_height: ${mult:${scale_image},${image_height_original}}
image_width: ${mult:${scale_image},${image_width_original}}

image_size:
    - ${image_width}
    - ${image_height}

img_size:
    - ${image_height}
    - ${image_width}

num_joints: 512
